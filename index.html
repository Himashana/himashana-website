    <!-- Detect low-power / GPU-off / data-saver / reduced-motion devices BEFORE first
         paint and tag <html> so the heavy effects (backdrop-blur, infinite animations)
         degrade gracefully while capable devices keep the full rich UI. -->
    <script>
        (function () {
            try {
                var n = navigator;
                var lowMem = n.deviceMemory && n.deviceMemory <= 2;
                var lowCpu = n.hardwareConcurrency && n.hardwareConcurrency <= 2;
                var saveData = n.connection && n.connection.saveData;
                var reduce = window.matchMedia &&
                    window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                // ?lite forces the lightweight mode (handy to preview GPU-off look).
                var forced = /[?&]lite\b/.test(location.search);
                if (forced || lowMem || lowCpu || saveData || reduce) {
                    document.documentElement.classList.add('perf-lite');
                }
            } catch (e) { /* keep full UI on detection failure */ }
        })();

        // Runtime FPS probe: specs can't reveal whether GPU acceleration is
        // actually on (a powerful machine with it disabled renders these blurs
        // on the CPU and janks). So measure real frame rate shortly after load
        // and drop to perf-lite if the page can't hold a smooth frame rate.
        window.addEventListener('load', function () {
            var root = document.documentElement;
            if (root.classList.contains('perf-lite') || !window.requestAnimationFrame) return;
            // Let the initial load/layout spike settle before sampling.
            setTimeout(function () {
                var frames = 0, start, last, longFrames = 0;
                function tick(now) {
                    if (start === undefined) { start = last = now; }
                    frames++;
                    if (now - last > 50) longFrames++;   // a visibly dropped frame
                    last = now;
                    if (now - start < 1000) {
                        requestAnimationFrame(tick);
                    } else {
                        var fps = frames / ((now - start) / 1000);
                        if (fps < 40 || longFrames > 5) root.classList.add('perf-lite');
                    }
                }
                requestAnimationFrame(tick);
            }, 600);
        });
    </script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/device-specific-styles.css">

            </button>
            <div class="collapse navbar-collapse" id="navbarNav">

                    <li class="nav-item"><a class="nav-link" href="#about-me-section">About</a></li>

                    <li class="nav-item"><a class="nav-link" href="#contact-section">Contact</a></li>

    <!-- Hero Section -->

        <div class="container">

                        <p class="hero-subtitle mb-2 fw-medium" data-bind="identity.greeting">Hi there, I'm</p>
                        <h1 class="hero-title fw-bold mb-3" id="typewriter-element">Kavindu Himashana Suraweera</h1>
                        <p class="hero-subheading mb-4 fs-4" data-bind="identity.title">Associate Software Engineer</p>
                        <div class="hero-buttons">
                            <a href="#contact-section" class="btn btn-primary btn-lg rounded-pill px-4 me-2">Let's Talk</a>
                            <a href="#skills-section" class="btn btn-outline-primary btn-lg rounded-pill px-4">My Skills</a>
                        </div>
                        <!-- Social links are rendered from data/profile.js by components-binder.js -->

                    </div>

                    <div class="hero-image-wrapper">
                        <img data-bind-src="identity.photo" data-bind-alt="identity.fullName" src="assets/images/me.jpg" alt="Kavindu Himashana Suraweera" class="hero-image">
                    </div>

    <!-- Components Container -->

        <div id="terminal-section"></div>
        <div id="skills-section"></div>
        <div id="educational-journey-section"></div>
        <div id="contact-section"></div>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="mb-0">
                &copy; <span id="current-year">2026</span> <span data-bind="identity.fullName">Kavindu Himashana Suraweera</span>. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { applyTypewriterEffect, initScrollReveal } from './typewriter.js';
        import { loadAllComponents } from './components-binder.js';
        import { PortfolioTerminal } from './terminal.js';
        import { profile } from './data/profile.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Load components, then bind profile data and reveal animations.
            loadAllComponents().then(() => {
                initScrollReveal();

                // Initialize terminal after components are loaded
                setTimeout(() => {
                    if (document.getElementById('terminal-input')) {
                        new PortfolioTerminal();
                    }
                }, 500);
            });

            // Hero name drives the typewriter and the document title.
            const titleEl = document.getElementById('typewriter-element');
            titleEl.textContent = profile.identity.fullName;
            document.title = `${profile.identity.fullName} - ${profile.identity.title}`;
            applyTypewriterEffect('typewriter-element');

            // Current year for footer
            document.getElementById('current-year').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
