<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavindu Himashana Suraweera - Software Engineer</title>
    <meta name="description" content="Portfolio of Kavindu Himashana Suraweera - Associate Software Engineer">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/device-specific-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Himashana</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about-me-section">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#skills-section">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="#educational-journey-section">Education</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact-section">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero-section" class="hero-section py-5 py-lg-0">
        <div class="container">
            <div class="row align-items-center min-vh-75">
                <div class="col-lg-8 text-center text-lg-start">
                    <div class="hero-content">
                        <p class="hero-subtitle mb-2 fw-medium">Hi there, I'm</p>
                        <h1 class="hero-title fw-bold mb-3" id="typewriter-element">Kavindu Himashana Suraweera</h1>
                        <p class="hero-subheading mb-4 fs-4">Associate Software Engineer</p>
                        <div class="hero-buttons">
                            <a href="#contact-section" class="btn btn-primary btn-lg rounded-pill px-4 me-2">Let's Talk</a>
                            <a href="#skills-section" class="btn btn-outline-primary btn-lg rounded-pill px-4">My Skills</a>
                        </div>
                        <div class="social-links mt-4">
                            <a href="#" class="social-link me-3" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                            <a href="#" class="social-link me-3" aria-label="GitHub"><i class="fab fa-github"></i></a>
                            <a href="#" class="social-link me-3" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                            <a href="#" class="social-link" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 d-none d-lg-flex justify-content-center">
                    <div class="hero-image-wrapper">
                        <img src="assets/images/me.jpg" alt="Kavindu Himashana Suraweera" class="hero-image">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Components Container -->
    <div class="components-container">
        <div id="about-me-section"></div>
        <div id="skills-section"></div>
        <div id="educational-journey-section"></div>
        <div id="contact-section"></div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="mb-0">
                &copy; <span id="current-year">2026</span> Kavindu Himashana Suraweera. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { applyTypewriterEffect } from './typewriter.js';
        import { loadAllComponents } from './components-binder.js';
        import { capitalizeText } from './helpers.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Load components
            loadAllComponents().then(() => {
                // Apply animations after components are loaded
                import('./typewriter.js').then(({ initScrollReveal }) => {
                    initScrollReveal();
                });
                capitalizeText('.timeline-title');
                capitalizeText('.timeline-subtitle');
                capitalizeText('.timeline-description');
            });

            // Typewriter effect
            applyTypewriterEffect('typewriter-element');

            // Current year for footer
            document.getElementById('current-year').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
