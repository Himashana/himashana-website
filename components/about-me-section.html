<section class="py-5" id="about-me-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="section-header text-center mb-5">
          <h2 class="section-title">About Me</h2>
          <div class="section-divider"></div>
        </div>
        <div class="about-content">
          <h3 class="mb-4 text-center" data-bind="bio.heading">Software Engineer & Developer</h3>
          <div data-bio-paragraphs></div>

          <div class="row g-3 mt-4">
            <div class="col-md-4">
              <div class="about-info-item">
                <i class="fas fa-envelope text-primary"></i>
                <div class="ms-3">
                  <div class="fw-semibold mb-1">Email</div>
                  <a data-bind-href="mailto:|contact.email" data-bind="contact.email" class="text-secondary"></a>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="about-info-item">
                <i class="fas fa-phone text-primary"></i>
                <div class="ms-3">
                  <div class="fw-semibold mb-1">Phone</div>
                  <a data-bind-href="tel:|contact.phoneHref" data-bind="contact.phone" class="text-secondary"></a>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="about-info-item">
                <i class="fas fa-map-marker-alt text-primary"></i>
                <div class="ms-3">
                  <div class="fw-semibold mb-1">Location</div>
                  <span class="text-secondary" data-bind="contact.locationShort"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
