<section class="py-5" id="educational-journey-section">
    <div class="container">
        <div class="section-header text-center mb-5">
            <h2 class="section-title">Education</h2>
            <div class="section-divider mx-auto"></div>
        </div>

        <div class="timeline-container">
            <!-- Timeline items are rendered from data/profile.js by components-binder.js -->
            <div class="timeline" id="education-timeline"></div>
        </div>

        <!-- Hrefs wired from data/profile.js (resumeUrl / certificatesUrl). -->
        <div class="education-actions d-flex flex-wrap justify-content-center gap-3 mt-5">
            <a class="btn btn-primary btn-lg rounded-pill px-4" data-action-resume>
                <i class="fas fa-file-lines me-2"></i>View Resume
            </a>
            <a class="btn btn-outline-primary btn-lg rounded-pill px-4" data-action-certificates>
                <i class="fas fa-certificate me-2"></i>View Certificates
            </a>
        </div>
    </div>
</section>
