<section class="py-5" id="terminal-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="section-header text-center mb-5">
                    <h2 class="section-title">Get to Know Me</h2>
                    <div class="section-divider mx-auto"></div>
                    <p class="section-subtitle mt-3">Prefer the command line? Type <code>help</code> to explore my background.</p>
                </div>
                
                <div class="terminal-window">
                    <div class="terminal-header">
                        <div class="terminal-buttons">
                            <span class="terminal-btn terminal-btn-close"></span>
                            <span class="terminal-btn terminal-btn-minimize"></span>
                            <span class="terminal-btn terminal-btn-maximize"></span>
                        </div>
                        <div class="terminal-title">himashana@portfolio:~$</div>
                    </div>
                    <div class="terminal-body" id="terminal-body">
                        <div class="terminal-output">
                            <div class="terminal-line">
                                <span class="terminal-prompt">guest@himashana:~$</span>
                                <span class="terminal-text">Welcome to Himashana's Portfolio Terminal v1.0</span>
                            </div>
                            <div class="terminal-line">
                                <span class="terminal-text">Type '<span class="text-success">help</span>' to see available commands.</span>
                            </div>
                            <div class="terminal-line">
                                <span class="terminal-text">Type '<span class="text-success">clear</span>' to clear the terminal.</span>
                            </div>
                            <div class="terminal-line terminal-blank"></div>
                        </div>
                        <div class="terminal-input-line">
                            <span class="terminal-prompt">guest@himashana:~$</span>
                            <label for="terminal-input" class="visually-hidden">Terminal command input</label>
                            <input type="text" class="terminal-input" id="terminal-input" aria-label="Terminal command input" autocomplete="off" spellcheck="false">
                            <span class="terminal-cursor" aria-hidden="true"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
